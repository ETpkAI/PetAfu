<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI诊室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .dashed-line {
            background-image: linear-gradient(to right, #e5e7eb 50%, transparent 50%);
            background-size: 8px 1px;
            background-repeat: repeat-x;
        }
    </style>
</head>
<body class="flex justify-center items-center h-[100dvh] bg-gray-100 sm:p-4">
    <div class="w-full max-w-[400px] h-full sm:h-[850px] bg-gradient-to-b from-[#E7E9FF] via-[#F4EBFA] to-[#F2F4F7] relative flex flex-col shadow-2xl sm:rounded-[32px] sm:border-[8px] sm:border-white overflow-hidden">
        
       <!-- Header -->
       <div class="px-5 pt-12 pb-4 flex justify-between items-center z-20 relative">
           <div class="flex items-center gap-2 text-gray-900">
               <i class="fa-solid fa-bars text-xl"></i>
               <h1 class="text-lg font-bold tracking-wider">阿福</h1>
           </div>
           <div class="flex items-center gap-3">
               <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-500 cursor-pointer shadow-sm">
                   <i class="fa-solid fa-trash-can"></i>
               </div>
               <div class="px-3 py-1.5 rounded-full bg-white flex items-center gap-1.5 text-[13px] font-medium shadow-sm cursor-pointer hover:bg-gray-50 transition border border-gray-100 text-gray-800">
                   <i class="fa-solid fa-shapes text-gray-700"></i>
                   智能体
               </div>
               <div class="px-3 py-1.5 rounded-full bg-white flex items-center gap-2 text-gray-700 shadow-sm cursor-pointer hover:bg-gray-50 transition border border-gray-100">
                   <i class="fa-solid fa-volume-high text-[#5D5CDE]"></i>
                   <div class="w-px h-3 bg-gray-300"></div>
                   <i class="fa-solid fa-ellipsis text-gray-500"></i>
               </div>
           </div>
       </div>

       <!-- Main Content Area -->
       <div class="flex-1 flex flex-col relative z-10 w-full h-full">
           
           <div class="text-center text-gray-400 text-[12px] mt-2 mb-2">20:44</div>
           <div class="text-center text-gray-400 text-[12px] flex items-center justify-center gap-2 mb-8">
               <div class="w-2 h-px bg-gray-300"></div>
               你已进入AI诊室
               <div class="w-2 h-px bg-gray-300"></div>
           </div>

           <!-- 3D Avatar Image Mockup -->
           <div class="absolute top-28 left-0 w-full flex justify-center z-0 opacity-80 pointer-events-none">
                <img src="https://images.unsplash.com/photo-1590611936760-eeb9bc598548?w=300&h=300&fit=crop" class="w-56 h-56 object-cover select-none" style="mask-image: radial-gradient(white, black);">
                <div class="absolute inset-0 bg-gradient-to-t from-[#EDEEFE] to-transparent"></div>
           </div>

           <!-- Big White Panel Content -->
           <div class="mt-auto px-4 z-10 flex flex-col pb-24 relative">
               
               <!-- Top Card: Clinic Progress -->
               <div class="bg-white rounded-[24px] shadow-sm mb-4 pt-1 pb-5 border border-white relative overflow-hidden">
                    <!-- Purple Header Area -->
                    <div class="bg-[#5D5DF0] w-full pt-3 pb-8 px-5 rounded-t-[24px] flex justify-between items-start text-white mb-[-20px]" style="border-radius: 20px 20px 0 0;">
                        <div class="flex items-center gap-2">
                             <h2 class="text-xl font-bold">AI诊室</h2>
                             <span class="text-[10px] bg-white/20 border border-white/40 px-1.5 py-0.5 rounded-sm backdrop-blur-sm">问诊中</span>
                        </div>
                        <button class="text-[13px] border border-white/50 bg-white/10 px-4 py-1 rounded-full hover:bg-white/20 transition backdrop-blur-sm">
                            退出
                        </button>
                    </div>

                    <!-- White Card Area overlaying purple -->
                    <div class="bg-white rounded-t-[20px] pt-4 px-5 relative z-10">
                        <div class="flex justify-between items-center text-[13px] text-gray-800 font-medium mb-4">
                            <span class="text-black font-bold">01·选咨询人</span>
                            <i class="fa-solid fa-angles-right text-gray-300 text-[10px]"></i>
                            <span class="text-gray-500">02·描述症状</span>
                            <i class="fa-solid fa-angles-right text-gray-300 text-[10px]"></i>
                            <span class="text-gray-500">03·诊疗建议</span>
                        </div>

                        <div class="dashed-line h-[1px] w-full mb-4 opacity-70"></div>

                        <p class="text-[15px] text-gray-800 leading-relaxed font-medium">
                            你好~我是你的AI医生，我将通过深度问诊了解你的健康状况，并提供明确的诊疗建议。
                        </p>
                    </div>
               </div>

               <!-- Bottom Card: Select Person -->
               <div class="bg-white rounded-[24px] shadow-sm mb-4 p-5 py-6">
                   <div class="flex items-start justify-between mb-1">
                       <h3 class="text-[17px] font-bold text-gray-900 flex items-center gap-1.5">
                           <i class="fa-regular fa-pen-to-square text-gray-600"></i> 你本次要为谁咨询呢？
                       </h3>
                       <i class="fa-solid fa-quote-right text-[#EDEEFF] text-4xl -mt-2 -mr-1"></i>
                   </div>
                   <p class="text-[12px] text-gray-400 mb-5 relative block -mt-1">结合个人信息，回答更具针对性哦</p>

                   <div class="flex gap-3 mb-5">
                       <button class="flex-1 bg-blue-50/50 hover:bg-blue-50 text-[#5D5DF0] font-medium py-3 rounded-xl flex items-center justify-center gap-2 transition text-[15px]">
                           <i class="fa-regular fa-user"></i> 为本人咨询
                       </button>
                       <button class="flex-1 bg-blue-50/50 hover:bg-blue-50 text-[#5D5DF0] font-medium py-3 rounded-xl flex items-center justify-center gap-2 transition text-[15px]">
                           <i class="fa-solid fa-circle-plus"></i> 新增咨询人
                       </button>
                   </div>

                   <div class="text-center text-[14px] text-gray-400 cursor-pointer hover:text-gray-600 transition">
                       跳过，直接咨询
                   </div>
               </div>
           </div>

       </div>

       <!-- Bottom Floating Bar -->
       <div class="absolute flex flex-col bottom-0 left-0 w-full pt-16 pb-8 px-4 z-20" style="background: linear-gradient(180deg, rgba(234,235,254,0) 0%, rgba(234,235,254,0.8) 30%, rgba(237,238,254,1) 100%);">
           <!-- Input Area -->
           <div class="flex items-center gap-2.5 px-1 bg-transparent">
               <div class="flex-1 bg-white rounded-full h-[52px] flex items-center px-2 pr-4 shadow-md">
                   <div class="w-9 h-9 rounded-full bg-white flex items-center justify-center border-2 border-[#2D336B] text-[#2D336B] mr-2 hover:bg-gray-100 transition cursor-pointer">
                       <i class="fa-solid fa-rss text-sm transform -rotate-45"></i>
                   </div>
                   <input type="text" placeholder="发消息或按住说话..." class="flex-1 bg-transparent border-none outline-none text-[15px] text-gray-700 placeholder-gray-400">
                   <div class="w-[26px] h-[26px] rounded-full border-2 border-gray-400 flex items-center justify-center text-gray-500 ml-2 cursor-pointer hover:border-gray-600 hover:text-gray-600 transition">
                       <i class="fa-solid fa-plus text-[10px]"></i>
                   </div>
               </div>
               <div class="w-[52px] h-[52px] shrink-0 rounded-full bg-white flex items-center justify-center text-[#2D336B] shadow-md hover:bg-gray-50 transition cursor-pointer">
                   <i class="fa-solid fa-camera text-xl"></i>
               </div>
           </div>
       </div>

    </div>
</body>
</html>
