version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads      # 图片持久化
      - ./backend/chroma_db:/app/chroma_db  # 向量库持久化
      - ./knowledge_base:/app/../knowledge_base:ro  # 知识库只读挂载
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
